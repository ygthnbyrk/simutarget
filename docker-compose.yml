version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: simutarget-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: simutarget-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: simutarget
      POSTGRES_PASSWORD: simutarget
      POSTGRES_DB: simutarget
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache (ileride kullanılacak)
  redis:
    image: redis:7-alpine
    container_name: simutarget-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
